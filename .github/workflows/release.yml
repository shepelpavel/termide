name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Quality checks before building
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check

      - name: Run clippy (strict mode)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Install cargo-deny
        # Rust-cache lets us skip rebuilding cargo-deny on every run;
        # `--locked` keeps the version reproducible.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Supply-chain audit (cargo-deny)
        run: cargo deny check

  # Cross-platform builds
  build:
    name: Build ${{ matrix.target }}
    needs: quality-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (also works in WSL)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04  # Use older Ubuntu for glibc compatibility
            archive: tar.gz
          # Linux x86_64 (musl, fully static — runs on Alpine and any
          # other distro without a glibc dependency)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            musl: true
          # Linux aarch64 (ARM servers, Raspberry Pi)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04  # Use older Ubuntu for glibc compatibility
            archive: tar.gz
            cross: true
          # Linux aarch64 (musl, fully static — runs under Termux on Android,
          # Alpine on ARM, and any glibc-free ARM64 system). Built via `cross`
          # so the musl toolchain + tree-sitter C deps link cleanly.
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            use_cross: true
          # macOS x86_64 (Intel Macs)
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # macOS Apple Silicon (M1/M2/M3)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # Windows x86_64 (native)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=-C linker=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools (Linux musl)
        if: matrix.musl
        # The musl C library + gcc wrapper. Rust's musl target links
        # statically by default, so no `target-feature=+crt-static`
        # flag is needed here; just the C toolchain to wrap any C deps.
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        # `cross` builds inside a target-matched container that ships the musl
        # cross toolchain, so the Rust code and the tree-sitter C deps link
        # against the same musl without hand-wiring a sysroot.
        run: cargo install cross --locked

      - name: Build
        # VFS uses rustls / russh — fully pure-Rust, no native OpenSSL —
        # so no extra features are required for static builds.
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p package
          cp target/${{ matrix.target }}/release/termide package/
          cp README.md LICENSE package/
          cd package
          tar czvf ../termide-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          cd ..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item "target/${{ matrix.target }}/release/termide.exe" package/
          Copy-Item README.md, LICENSE package/
          Compress-Archive -Path package/* -DestinationPath "termide-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: termide-${{ matrix.target }}
          path: termide-${{ github.ref_name }}-${{ matrix.target }}.*

  # Build Debian packages
  build-deb:
    name: Build .deb packages
    needs: quality-checks
    runs-on: ubuntu-22.04  # Use older Ubuntu for glibc compatibility with Debian 12
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build and package
        run: cargo deb --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: termide-deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb

  # Build RPM packages
  build-rpm:
    name: Build .rpm packages
    needs: quality-checks
    runs-on: ubuntu-22.04  # Use older Ubuntu for glibc compatibility
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate RPM
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: termide-rpm-${{ matrix.target }}
          path: target/${{ matrix.target }}/generate-rpm/*.rpm

  # Create GitHub Release with artifacts
  release:
    name: Create Release
    needs: [build, build-deb, build-rpm]
    runs-on: ubuntu-latest
    # Only create release when triggered by tag (not workflow_dispatch)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract section for this version from CHANGELOG.md
          # Start from "## [VERSION]" line, end before next "## [" line
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$BODY" > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release_notes.md
          draft: false
          prerelease: false

  # Update AUR packages
  update-aur:
    name: Update AUR
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Update AUR packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Calculate SHA256 checksums
          SRC_SHA=$(curl -sL "https://github.com/termide/termide/archive/refs/tags/${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)
          BIN_X64_SHA=$(curl -sL "https://github.com/termide/termide/releases/download/${VERSION}/termide-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)
          BIN_ARM_SHA=$(curl -sL "https://github.com/termide/termide/releases/download/${VERSION}/termide-${VERSION}-aarch64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)

          # Update termide (source package)
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git clone ssh://aur@aur.archlinux.org/termide.git /tmp/aur-termide
          cd /tmp/aur-termide

          # Sync package() and other sections from repo
          cp $GITHUB_WORKSPACE/packaging/aur/PKGBUILD PKGBUILD

          # Update PKGBUILD
          sed -i "s/pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/sha256sums=.*/sha256sums=('${SRC_SHA}')/" PKGBUILD

          # Generate .SRCINFO using Docker (run as non-root user)
          OWNER=$(stat -c %u:%g .)
          docker run --rm -v "$PWD:/pkg" archlinux:base bash -c "
            pacman -Sy --noconfirm pacman-contrib sudo fakeroot
            useradd -m builder
            chown -R builder:builder /pkg
            cd /pkg && sudo -u builder makepkg --printsrcinfo > .SRCINFO
          "
          sudo chown -R $OWNER .

          git config user.email "github-actions@termide.dev"
          git config user.name "GitHub Actions"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push || echo "Nothing to push for termide"

          # Update termide-bin (binary package)
          cd /tmp
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git clone ssh://aur@aur.archlinux.org/termide-bin.git /tmp/aur-termide-bin
          cd /tmp/aur-termide-bin

          # Sync package() and other sections from repo
          cp $GITHUB_WORKSPACE/packaging/aur/PKGBUILD-bin PKGBUILD

          # Update PKGBUILD
          sed -i "s/pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/sha256sums_x86_64=.*/sha256sums_x86_64=('${BIN_X64_SHA}')/" PKGBUILD
          sed -i "s/sha256sums_aarch64=.*/sha256sums_aarch64=('${BIN_ARM_SHA}')/" PKGBUILD

          # Generate .SRCINFO using Docker (run as non-root user)
          OWNER=$(stat -c %u:%g .)
          docker run --rm -v "$PWD:/pkg" archlinux:base bash -c "
            pacman -Sy --noconfirm pacman-contrib sudo fakeroot
            useradd -m builder
            chown -R builder:builder /pkg
            cd /pkg && sudo -u builder makepkg --printsrcinfo > .SRCINFO
          "
          sudo chown -R $OWNER .

          git config user.email "github-actions@termide.dev"
          git config user.name "GitHub Actions"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push || echo "Nothing to push for termide-bin"

  # Update Homebrew tap
  update-homebrew:
    name: Update Homebrew
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Update Homebrew formula
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Calculate SHA256 for all platforms
          SHA_DARWIN_X64=$(curl -sL "https://github.com/termide/termide/releases/download/${VERSION}/termide-${VERSION}-x86_64-apple-darwin.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_DARWIN_ARM=$(curl -sL "https://github.com/termide/termide/releases/download/${VERSION}/termide-${VERSION}-aarch64-apple-darwin.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_X64=$(curl -sL "https://github.com/termide/termide/releases/download/${VERSION}/termide-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_ARM=$(curl -sL "https://github.com/termide/termide/releases/download/${VERSION}/termide-${VERSION}-aarch64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)

          # Clone homebrew-termide
          git clone https://x-access-token:${GH_TOKEN}@github.com/termide/homebrew-termide.git /tmp/homebrew-termide
          cd /tmp/homebrew-termide

          # Update version line
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Formula/termide.rb

          # Update all URLs (replace version in download URLs)
          sed -i "s|/download/[0-9.]*|/download/${VERSION}|g" Formula/termide.rb
          sed -i "s|termide-[0-9.]*-|termide-${VERSION}-|g" Formula/termide.rb

          # Update SHA256 for each platform using unique URL patterns as anchors
          sed -i "/x86_64-apple-darwin/{ n; s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA_DARWIN_X64}\"/; }" Formula/termide.rb
          sed -i "/aarch64-apple-darwin/{ n; s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA_DARWIN_ARM}\"/; }" Formula/termide.rb
          sed -i "/x86_64-unknown-linux-gnu/{ n; s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA_LINUX_X64}\"/; }" Formula/termide.rb
          sed -i "/aarch64-unknown-linux-gnu/{ n; s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA_LINUX_ARM}\"/; }" Formula/termide.rb

          git config user.email "github-actions@termide.dev"
          git config user.name "GitHub Actions"
          git add Formula/termide.rb
          git diff --cached --quiet || git commit -m "Update to ${VERSION}"
          git push || echo "Nothing to push"
