# Standalone "tombstone" crate that reclaims the `termide` name on crates.io.
#
# TermIDE itself is a multi-crate Cargo workspace and is NOT published to
# crates.io. The name there belongs to a very early release that cannot be
# removed, so `cargo install termide` used to fetch that obsolete code. This
# tiny crate replaces it: its crates.io page and the installed binary both
# point users at the GitHub distribution.
#
# It is intentionally its OWN workspace (the empty `[workspace]` table below)
# so the parent TermIDE workspace ignores it and `cargo publish` here is
# self-contained.
#
# Publish steps (run from this directory, needs crates.io credentials):
#   1. Set `version` below to one higher than the current crates.io max.
#   2. Yank the old real versions:  cargo yank --version <V> termide
#   3. cargo publish
[package]
name = "termide"
version = "0.0.0" # ⚠ REPLACE before publishing: must be > current crates.io max version
edition = "2021"
description = "Obsolete crates.io placeholder — TermIDE is distributed via GitHub, not crates.io. Install with: cargo install --git https://github.com/termide/termide"
license = "MIT"
repository = "https://github.com/termide/termide"
homepage = "https://github.com/termide/termide"
readme = "README.md"
keywords = ["tui", "ide", "editor"]
categories = ["command-line-utilities"]

[[bin]]
name = "termide"
path = "main.rs"

# Detach from the parent TermIDE workspace.
[workspace]
