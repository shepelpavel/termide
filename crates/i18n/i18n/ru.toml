[plurals]
# Russian pluralization: 1 день, 2-4 дня, 5+ дней
day = { one = "день", few = "дня", other = "дней" }
# 1 элемент, 2-4 элемента, 5+ элементов
element = { one = "элемент", few = "элемента", other = "элементов" }
# Russian pluralization: 1 файл, 2-4 файла, 5+ файлов
file = { one = "", few = "а", other = "ов" }
# 1 час, 2-4 часа, 5+ часов
hour = { one = "час", few = "часа", other = "часов" }
# 1 минута, 2-4 минуты, 5+ минут
minute = { one = "минуту", few = "минуты", other = "минут" }
# 1 месяц, 2-4 месяца, 5+ месяцев
month = { one = "месяц", few = "месяца", other = "месяцев" }
# 1 неделя, 2-4 недели, 5+ недель
week = { one = "неделю", few = "недели", other = "недель" }
