[package]
name = "termide-vfs"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Virtual File System abstraction for termide with network filesystem support"

[dependencies]
thiserror = "1.0"
url.workspace = true
log = "0.4"
chrono.workspace = true
libc.workspace = true
termide-logger = { path = "../logger" }

# SFTP support
ssh2 = "0.9"

# OpenSSL vendored (for cross-compilation)
openssl-sys = { version = "0.9", optional = true, features = ["vendored"] }

# FTP support
suppaftp = { version = "5.3", features = ["native-tls"] }

# SMB support (optional, may require system libraries)
pavao = { version = "0.2", optional = true }

# For temp file management
tempfile.workspace = true

# For directory cache
dirs.workspace = true

[features]
default = ["sftp", "ftp"]
sftp = []
ftp = []
smb = ["pavao"]
nfs = []
vendored-openssl = ["openssl-sys"]

[dev-dependencies]
tempfile.workspace = true
