# DOS Navigator theme
name = "dos-navigator"
is_light = false

[colors]
# Base - Classic DOS Navigator navy blue
bg = { rgb = [0, 0, 128] }
fg = { rgb = [0, 170, 170] }

# Accented - Teal panels
accented_bg = { rgb = [0, 128, 128] }
accented_fg = { rgb = [255, 255, 0] }

# Selection - Cyan highlight
selected_bg = { rgb = [0, 170, 170] }
selected_fg = { rgb = [0, 0, 128] }

# Disabled
disabled = { rgb = [85, 85, 85] }

# Semantic
success = { rgb = [0, 255, 0] }
warning = { rgb = [255, 255, 0] }
error = { rgb = [255, 85, 85] }
