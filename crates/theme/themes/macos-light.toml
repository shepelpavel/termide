# macOS Light theme
name = "macos-light"
is_light = true

[colors]
# Base - Light gray background
bg = { rgb = [246, 246, 246] }
fg = { rgb = [51, 51, 51] }

# Accented - White panels
accented_bg = { rgb = [255, 255, 255] }
accented_fg = { rgb = [0, 122, 255] }

# Selection - White on blue (Aqua accent)
selected_bg = { rgb = [0, 122, 255] }
selected_fg = { rgb = [255, 255, 255] }

# Disabled - Light gray
disabled = { rgb = [142, 142, 147] }

# Semantic
success = { rgb = [52, 199, 89] }
warning = { rgb = [255, 149, 0] }
error = { rgb = [255, 59, 48] }
